{% extends "layout.html" %}

{% block title %}
    Quote
{% endblock %}

{% block main %}
<table class="table">
    <thead>
        <tr>
            <th>Symbol</th>
            <th>Shares</th>
            <th>Price</th>
            <th>Total</th>
        </tr>
    </thead>
    <tbody>
        {% for stock in stocks %}
            <tr>
                <td>{{ stock.symbol }}</td>
                <td>{{ stock.shares }}</td>
                <td>{{ stock.price }}</td>
                <td>{{ stock.total }}</td>
                <td>
                    <form action="/buy" method="post">
                        <input type="hidden" name="symbol" value="{{ stock.symbol }}">
                        <input type="number" name="shares" min="1">
                        <button type="submit">Buy</button>
                    </form>
                </td>

                <td>
                    <form action="/sell" method="post">
                        <input type="hidden" name="symbol" value="{{ stock.symbol }}">
                        <input type="number" name="shares" min="1">
                        <button type="submit">Sell</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
    </tbody>
    <tfoot>
        <tr>
            <td colspan="3">Cash</td>
            <td>{{ cash | usd }}</td>
        </tr>
        <tr>
            <td colspan="3"><strong>Grand Total</strong></td>
            <td><strong>{{ grand_total | usd }}</strong></td>
        </tr>
    </tfoot>
</table>
{% endblock %}
